<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESS DENIED | VANDER GUARD SECURITY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.3);
            --text: #e2e8f0;
            --text-dim: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(239, 68, 68, 0.1) 0%, transparent 50%),
                linear-gradient(rgba(13, 17, 26, 0.8), rgba(13, 17, 26, 0.8)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .container {
            text-align: center;
            padding: 60px;
            background: rgba(13, 17, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
            animation: pulseIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes pulseIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .icon {
            font-size: 80px;
            color: var(--danger);
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px var(--danger-glow));
            animation: flicker 2s infinite linear;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 15px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        p {
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 800;
            border: 1px solid var(--danger-glow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .details {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.03;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    <div class="container">
        <div class="icon">
            <i class="fa-solid fa-shield-slash"></i>
        </div>
        <h1>Access Revoked</h1>
        <p>Your connection has been flagged as a non-authorized automated agent or bot. Browser-based script fetching is strictly prohibited on the Vander Guard network.</p>
        
        <div class="security-badge">
            <i class="fa-solid fa-triangle-exclamation"></i>
            Violation Detected: AUTO_FETCH_BLOCK
        </div>

        <div class="details">
            PROTECTION KERNEL: VANDER-GUARD INDUSTRIAL V4.2<br>
            THREAT SIGNATURE: <span id="sign">--</span><br>
            IP ADDRESS: <span id="ip">--</span>
        </div>
    </div>

    <script>
        document.getElementById('sign').innerText = Math.random().toString(36).substring(2, 10).toUpperCase();
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => document.getElementById('ip').innerText = d.ip).catch(() => {});
    </script>
</body>
</html>
