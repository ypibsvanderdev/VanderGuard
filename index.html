<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANDER GUARD | THE OMNI-REAPER</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.5.1/css/all.css">
    <style>
        /* [ VANDER-SINGULARITY V3 | PREMIUM CSS ] */
        :root {
            --bg-main: #020204;
            --sidebar-bg: #050508;
            --card-bg: rgba(10, 11, 16, 0.7);
            --border: rgba(157, 80, 187, 0.15);
            --purple: #9d50bb;
            --purple-glow: rgba(157, 80, 187, 0.4);
            --cyan: #00f2ff;
            --cyan-glow: rgba(0, 242, 255, 0.4);
            --accent: #9d50bb;
            --red: #ff3e3e;
            --blue: #3e88ff;
            --surface: #10121a;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-main); color: var(--text-primary); font-family: var(--font-main); min-height: 100vh; overflow-x: hidden; }

        .mesh-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: url('vander_guard_bg_1774121380017.png') no-repeat center center fixed;
            background-size: cover;
            filter: brightness(0.4) saturate(1.2);
        }

        .mesh-background::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 0%, var(--bg-main) 100%);
        }

        .glass-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* AUTHENTICATION */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: var(--transition); }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .auth-card { width: 440px; padding: 3.5rem; text-align: center; border: 1px solid var(--purple); animation: auth-pulse 2s infinite alternate; }
        @keyframes auth-pulse { from { box-shadow: 0 0 20px rgba(157, 80, 187, 0.1); } to { box-shadow: 0 0 40px rgba(157, 80, 187, 0.3); } }

        .auth-logo i { font-size: 3.5rem; color: var(--purple); filter: drop-shadow(0 0 20px var(--purple-glow)); margin-bottom: 2rem; }
        .logo-text { font-size: 1.8rem; font-weight: 800; letter-spacing: 3px; display: flex; justify-content: center; gap: 5px; }
        .vander { color: white; }
        .guard { color: var(--purple); }

        /* UI ELEMENTS */
        .btn-primary { 
            background: linear-gradient(135deg, var(--purple), #6a11cb); 
            color: white; border: 1px solid rgba(255,255,255,0.1); 
            padding: 16px 30px; border-radius: 14px; 
            font-weight: 800; cursor: pointer; transition: var(--transition);
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px var(--purple-glow); }

        input {
            width: 100%; padding: 16px; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); color: white; border-radius: 14px; 
            margin-bottom: 1.5rem; font-family: var(--font-main); outline: none;
            transition: var(--transition);
        }
        input:focus { border-color: var(--purple); background: rgba(157, 80, 187, 0.05); }

        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }

        /* DASHBOARD */
        #app-wrapper { display: none; grid-template-columns: 300px 1fr; min-height: 100vh; }
        .sidebar { background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 2.5rem; }
        .nav-item { 
            background: transparent; border: none; width: 100%;
            display: flex; align-items: center; gap: 18px; 
            padding: 14px 20px; border-radius: 14px; color: var(--text-secondary); 
            font-weight: 700; cursor: pointer; transition: var(--transition);
            margin-bottom: 8px;
        }
        .nav-item.active { background: rgba(157, 80, 187, 0.1); color: white; border-left: 4px solid var(--purple); }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }

        .content-area { padding: 4rem 6rem; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px; }

        .stat-card { padding: 2rem; border-left: 4px solid var(--purple); }
        .stat-card .value { font-size: 2.5rem; font-weight: 900; background: linear-gradient(to right, white, var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }

        .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: var(--sidebar-bg); border: 1px solid var(--purple); padding: 15px 30px; border-radius: 12px; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); visibility: hidden; opacity: 0; transition: 0.3s; color: white; font-weight: 700; }
        .toast.show { visibility: visible; opacity: 1; top: 40px; }
    </style>
</head>
<body class="auth-mode">
    <div class="mesh-background"></div>

    <!-- AUTHENTICATION SCREEN -->
    <div id="auth-screen" class="modal-overlay">
        <div class="auth-card glass-card">
            <div class="auth-logo">
                <i class="fa-solid fa-shield-halved"></i>
                <div class="logo-text"><span class="vander">VANDER</span><span class="guard">GUARD</span></div>
                <p style="font-size: 0.7rem; color: var(--purple); letter-spacing: 2px; margin-top: 5px; font-weight: 800;">SINGULARITY V3</p>
            </div>
            <div class="auth-content" style="margin-top: 2rem;">
                <h2 style="margin-bottom: 0.5rem;">Access Portal</h2>
                <p style="color: var(--text-muted); margin-bottom: 2rem;">Authorized Administrators Only.</p>

                <label>CRITICAL-UID</label>
                <input type="text" id="login-uid" placeholder="VanderElite">
                
                <label>NEURAL-PIN</label>
                <input type="password" id="login-pin" placeholder="••••••••">

                <button id="auth-btn" class="btn-primary" style="width:100%;">SYNC INTERFACE</button>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="app-wrapper">
        <aside class="sidebar">
            <div class="logo" style="display:flex; align-items:center; gap:10px; font-weight:900; font-size:1.4rem; margin-bottom:4rem;">
                <i class="fa-solid fa-shield-halved" style="color:var(--purple);"></i>
                <span>VANDERGUARD</span>
            </div>

            <div class="sidebar-nav">
                <button class="nav-item active" data-tab="dashboard"><i class="fa-solid fa-grid-2"></i> Dashboard</button>
                <button class="nav-item" data-tab="key-gen"><i class="fa-solid fa-sparkles"></i> Key Engine</button>
                <button class="nav-item" data-tab="integration"><i class="fa-solid fa-code"></i> Integration</button>
            </div>
        </aside>

        <main class="content-area">
            <section id="tab-dashboard" class="tab-content" style="display:block;">
                <h1>Neural Overview</h1>
                <p style="color:var(--text-muted); margin-bottom:3rem;">Autonomous shield status across all sectors.</p>

                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 30px;">
                    <div class="stat-card glass-card">
                        <label>SYNCED SLAVETS</label>
                        <span class="value">9,240</span>
                    </div>
                    <div class="stat-card glass-card" style="border-color: var(--cyan);">
                        <label>ACTIVE PULSE</label>
                        <span class="value" style="background: linear-gradient(to right, white, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ONLINE</span>
                    </div>
                    <div class="stat-card glass-card" style="border-color: var(--red);">
                        <label>IDS REJECTIONS</label>
                        <span class="value" style="background: linear-gradient(to right, white, var(--red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">1.2M</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="notification" class="toast">Access Authorized. Syncing...</div>

    <script>
        /* [ VANDER-SINGULARITY V3 | PREMIUM LOGIC ] */
        document.addEventListener('DOMContentLoaded', () => {
            const authScreen = document.getElementById('auth-screen');
            const appWrapper = document.getElementById('app-wrapper');
            const authBtn = document.getElementById('auth-btn');
            const toast = document.getElementById('notification');

            authScreen.classList.add('active');

            authBtn.onclick = () => {
                const uid = document.getElementById('login-uid').value;
                if(!uid) return;

                toast.classList.add('show');
                authBtn.innerText = "AUTHENTICATING...";
                authBtn.disabled = true;

                setTimeout(() => {
                    authScreen.style.display = 'none';
                    appWrapper.style.display = 'grid';
                    toast.classList.remove('show');
                }, 1500);
            };

            // Basic Tab Logic
            document.querySelectorAll('.nav-item').forEach(item => {
                item.onclick = () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    showToast("Switching to Neural Sector: " + item.innerText);
                };
            });

            function showToast(m) {
                toast.innerText = m;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
        });
    </script>
</body>
</html>
